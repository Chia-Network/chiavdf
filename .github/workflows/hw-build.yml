name: HW Build

on:
  push:
    branches:
      - main
  release:
    types: [published]
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  # SHA is added to the end if on `main` to let all main workflows run
  group: ${{ github.ref }}-${{ github.workflow }}-${{ github.event_name }}-${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/long_lived/')) && github.sha || '' }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write

jobs:
  build-hw:
    name: Build HW VDF Client
    runs-on: [ubuntu-22.04]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: Chia-Network/actions/setup-python@main
        name: Install Python
        with:
          python-version: "3.10"

      - name: Set Env
        uses: Chia-Network/actions/setjobenv@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libgmp-dev libboost-system-dev

      - name: Download USB drivers
        run: ./scripts/get-libft4222.sh install

      - name: Compile
        working-directory: "${{ github.workspace }}/src"
        run: make -f Makefile.vdf-client emu_hw_test hw_test emu_hw_vdf_client hw_vdf_client

      - name: Smoke test
        working-directory: "${{ github.workspace }}/src"
        run: |
          # CI runners do not have FT4222 hardware attached; only validate binaries exist.
          test -x ./hw_vdf_client
          test -x ./hw_test
          ./emu_hw_test
          ./emu_hw_vdf_client --list

      - name: Upload Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: hw-vdf
          path: |
            ${{ github.workspace }}/src/emu_hw_test
            ${{ github.workspace }}/src/hw_test
            ${{ github.workspace }}/src/hw_vdf_client
            ${{ github.workspace }}/src/emu_hw_vdf_client
            ${{ github.workspace }}/src/hw/libft4222/build-x86_64/libft4222.so

      - name: Assemble .deb
        env:
          INSTALLER_VERSION: "${{ env.RELEASE_TAG || format('0.0.1-{0}', github.run_id) }}"
          PLATFORM: "amd64"
        run: |
          pip install jinjanator
          CLI_DEB_BASE="chiavdf-hw_$INSTALLER_VERSION-1_$PLATFORM"
          mkdir -p "dist/$CLI_DEB_BASE/usr/bin"
          mkdir -p "dist/$CLI_DEB_BASE/usr/lib"
          mkdir -p "dist/$CLI_DEB_BASE/DEBIAN"
          mkdir -p "dist/$CLI_DEB_BASE/etc/udev/rules.d"
          j2 -o "dist/$CLI_DEB_BASE/DEBIAN/control" assets/deb/control.j2

          cp ${{ github.workspace }}/src/emu_hw_test dist/$CLI_DEB_BASE/usr/bin/
          cp ${{ github.workspace }}/src/hw_test dist/$CLI_DEB_BASE/usr/bin/
          cp ${{ github.workspace }}/src/hw_vdf_client dist/$CLI_DEB_BASE/usr/bin/
          cp ${{ github.workspace }}/src/emu_hw_vdf_client dist/$CLI_DEB_BASE/usr/bin/
          cp ${{ github.workspace }}/src/hw/libft4222/build-x86_64/libft4222.so dist/$CLI_DEB_BASE/usr/lib/
          echo 'SUBSYSTEM=="usb", ATTRS{idVendor}=="0403", ATTRS{idProduct}=="601c", MODE="0666"' > dist/$CLI_DEB_BASE/etc/udev/rules.d/99-chiavdf.rules
          dpkg-deb --build --root-owner-group "dist/$CLI_DEB_BASE"

          echo "DEB_NAME=$CLI_DEB_BASE.deb" >> $GITHUB_ENV

      - name: Upload Installer
        uses: actions/upload-artifact@v5
        with:
          name: installer
          path: |
            ${{ github.workspace }}/dist/${{ env.DEB_NAME }}

      - name: Upload release artifacts
        if: env.RELEASE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload \
            $RELEASE_TAG \
            dist/${{ env.DEB_NAME }}

      - uses: Chia-Network/actions/github/jwt@main
        if: env.RELEASE == 'true'

      - name: Trigger repo update
        if: env.RELEASE == 'true'
        uses: Chia-Network/actions/github/glue@main
        with:
          json_data: '{"release_version":"${{ env.RELEASE_TAG }}"}'
          glue_url: ${{ secrets.GLUE_API_URL }}
          glue_project: "chiavdf-hw"
          glue_path: "trigger"

  build-hw-macos-arm64:
    name: Build HW VDF Client (macOS arm64)
    runs-on: [macos-13-arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: Chia-Network/actions/setup-python@main
        name: Install Python
        with:
          python-version: "3.10"

      - name: Set Env
        uses: Chia-Network/actions/setjobenv@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install deps
        run: |
          brew install boost gmp

      - name: Download USB drivers (FT4222H)
        run: ./scripts/get-libft4222.sh install

      - name: Compile
        working-directory: "${{ github.workspace }}/src"
        run: make -f Makefile.vdf-client emu_hw_test hw_test emu_hw_vdf_client hw_vdf_client

      - name: Smoke test
        working-directory: "${{ github.workspace }}/src"
        run: |
          # CI runners do not have FT4222 hardware attached; only validate binaries exist.
          test -x ./hw_vdf_client
          test -x ./hw_test
          ./emu_hw_test
          ./emu_hw_vdf_client --list

      - name: Upload Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: hw-vdf-macos-arm64
          path: |
            ${{ github.workspace }}/src/emu_hw_test
            ${{ github.workspace }}/src/hw_test
            ${{ github.workspace }}/src/hw_vdf_client
            ${{ github.workspace }}/src/emu_hw_vdf_client
            ${{ github.workspace }}/src/hw/libft4222/libft4222.dylib
            ${{ github.workspace }}/src/hw/libft4222/libft4222.1.4.4.190.dylib
            ${{ github.workspace }}/src/hw/libft4222/libftd2xx.dylib

  build-hw-windows:
    name: Build HW VDF Client (Windows)
    runs-on: [windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: Chia-Network/actions/setup-python@main
        name: Install Python
        with:
          python-version: "3.10"

      - name: Set Env
        uses: Chia-Network/actions/setjobenv@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# NOTE: The third-party MSYS2 action is blocked by repo policy right now.
# If/when allowed, you can replace the choco-based install below with:
#   - name: Install deps (MSYS2)
#     uses: msys2/setup-msys2@v2
#     with:
#       update: true
#       install: >-
#         mingw-w64-x86_64-toolchain
#         mingw-w64-x86_64-gmp
#         mingw-w64-x86_64-boost
#         mingw-w64-x86_64-make

      - name: Install MSYS2 and deps
        env:
          CHERE_INVOKING: "1"
        shell: pwsh
        run: |
          choco install msys2 -y
          C:\msys64\usr\bin\bash.exe -lc "pacman -Syu --noconfirm"
          C:\msys64\usr\bin\bash.exe -lc "pacman -S --noconfirm --needed mingw-w64-x86_64-toolchain mingw-w64-x86_64-gmp mingw-w64-x86_64-boost mingw-w64-x86_64-make"

      - name: Download USB drivers (FT4222H)
        run: powershell -ExecutionPolicy Bypass -File scripts/get-libft4222.ps1 install

      - name: Compile
        working-directory: "${{ github.workspace }}/src"
        env:
          CHERE_INVOKING: "1"
          MSYSTEM: MINGW64
        shell: pwsh
        run: C:\msys64\usr\bin\bash.exe -lc "make -f Makefile.vdf-client emu_hw_test hw_test emu_hw_vdf_client hw_vdf_client"

      - name: Smoke test
        working-directory: "${{ github.workspace }}/src"
        env:
          CHERE_INVOKING: "1"
          MSYSTEM: MINGW64
        shell: pwsh
        run: |
          C:\msys64\usr\bin\bash.exe -lc "test -x ./hw_vdf_client.exe || test -x ./hw_vdf_client"
          C:\msys64\usr\bin\bash.exe -lc "test -x ./hw_test.exe || test -x ./hw_test"
          C:\msys64\usr\bin\bash.exe -lc "./emu_hw_test.exe || ./emu_hw_test"
          C:\msys64\usr\bin\bash.exe -lc "PATH=\"$PWD/hw/libft4222:$PATH\" ./emu_hw_vdf_client.exe --list || PATH=\"$PWD/hw/libft4222:$PATH\" ./emu_hw_vdf_client --list"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: hw-vdf-windows
          path: |
            ${{ github.workspace }}/src/emu_hw_test.exe
            ${{ github.workspace }}/src/hw_test.exe
            ${{ github.workspace }}/src/hw_vdf_client.exe
            ${{ github.workspace }}/src/emu_hw_vdf_client.exe
            ${{ github.workspace }}/src/emu_hw_test
            ${{ github.workspace }}/src/hw_test
            ${{ github.workspace }}/src/hw_vdf_client
            ${{ github.workspace }}/src/emu_hw_vdf_client
            ${{ github.workspace }}/src/hw/libft4222/libft4222.dll
            ${{ github.workspace }}/src/hw/libft4222/ftd2xx.dll
            ${{ github.workspace }}/src/hw/libft4222/libft4222.lib
            ${{ github.workspace }}/src/hw/libft4222/ftd2xx.lib
